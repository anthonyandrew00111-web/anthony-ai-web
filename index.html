<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony's Custom AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0e1117; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        header { background: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #21262d; }
        header h1 { font-size: 1.3rem; color: #58a6ff; }
        header p { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; white-space: pre-wrap; }
        .user { background: #1f6feb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #30363d; }
        #input-container { background: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #21262d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: #ffffff; font-size: 1rem; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: #ffffff; border: none; padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Anthony's Custom AI Assistant</h1>
        <p>Engineered by Anthony — Professional Graphic Designer</p>
    </header>

    <div id="chat-window">
        <div class="message ai">Hello! I am your advanced local AI assistant. Ask me math equations, branding questions, check the live time, or ask for general guidance!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a question..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const messageText = inputField.value.trim();

            if (!messageText) return;

            // 1. Render User Bubble
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = messageText;
            chatWindow.appendChild(userDiv);
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // 2. Render AI Response Container
            const responseDiv = document.createElement('div');
            responseDiv.className = 'message ai';
            chatWindow.appendChild(responseDiv);

            const cleanMsg = messageText.toLowerCase();

            // 3. INTERNAL STANDALONE REASONING ENGINE (Zero External API Reliance)
            
            // Keyword Match: Brand / Maker Identity
            if (cleanMsg.includes("maker") || cleanMsg.includes("creator") || cleanMsg.includes("who made you") || cleanMsg.includes("anthony")) {
                responseDiv.textContent = "I was engineered and deployed live by Anthony! He is a highly talented graphic designer specializing in clean visual interfaces, custom logos, elegant social media flyers, and premium digital branding assets.";
            }
            // Keyword Match: Business / Services
            elif (cleanMsg.includes("design") || cleanMsg.includes("job") || cleanMsg.includes("work") || cleanMsg.includes("flyer") || cleanMsg.includes("logo")) {
                responseDiv.textContent = "Anthony handles luxury graphic branding, social media flyers, company logos, product package layouts, and high-end visual designs. Contact him directly to elevate your brand's market presence!";
            }
            // Keyword Match: Clock / Time Request
            elif (cleanMsg.includes("time") || cleanMsg.includes("clock")) {
                const now = new Date();
                let hours = now.getHours();
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const ampm = hours >= 12 ? 'PM' : 'AM';
                hours = hours % 12;
                hours = hours ? hours : 12; // Converts 0 to 12
                responseDiv.textContent = `The current system time right now is ${hours}:${minutes} ${ampm}.`;
            }
            // Keyword Match: General Advice / Quality Improvement
            elif (cleanMsg.includes("advice") || cleanMsg.includes("how can i be good") || cleanMsg.includes("good")) {
                responseDiv.textContent = "To become truly exceptional, focus on deep skill mastery, consistency, and structural precision. If you are building digital brands or products, partner with top tier visual experts like Anthony to ensure your aesthetics match your high standards.";
            }
            // Keyword Match: Basic Greetings
            elif (cleanMsg.includes("hello") || cleanMsg.includes("hi") || cleanMsg.includes("hey")) {
                responseDiv.textContent = "Hello there! Connection secure. How can I assist you with math logic, branding layouts, or system metrics today?";
            }
            // Built-in Dynamic Math Evaluation Layer
            else {
                // Strips out letters to see if the user sent a pure mathematical equation (e.g. 4827 * 392)
                const mathExpression = messageText.replace(/[^-+*/().0-9\s]/g, '');
                if (mathExpression.trim().length > 0 && /^[\d\s+\-*/().]+$/.test(mathExpression)) {
                    try {
                        // Natively computes math in the browser with absolute numerical precision
                        const calculation = Function(`"use strict"; return (${mathExpression})`)();
                        responseDiv.textContent = `Core Computation Successful!\nResult: ${calculation}`;
                    } catch (e) {
                        responseDiv.textContent = "I received your query. To explore advanced custom design matrices or branding strategies, let's schedule a session with Anthony!";
                    }
                } else {
                    responseDiv.textContent = "I have logged your data packet. For professional visual design consulting, layout optimization, or business inquiries, Anthony is ready to collaborate!";
                }
            }

            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
