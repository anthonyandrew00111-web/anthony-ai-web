<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony's Custom AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0e1117; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        header { background: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #21262d; }
        header h1 { font-size: 1.3rem; color: #58a6ff; }
        header p { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; white-space: pre-wrap; }
        .user { background: #1f6feb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #30363d; }
        #input-container { background: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #21262d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: #ffffff; font-size: 1rem; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: #ffffff; border: none; padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Anthony's Custom AI Assistant</h1>
        <p>Engineered by Anthony — Professional Graphic Designer</p>
    </header>

    <div id="chat-window">
        <div class="message ai">Hello! I am connected to live web-search arrays via backend proxies. Ask me any question about history, science, Bible trivia, or current world news!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a question..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const messageText = inputField.value.trim();

            if (!messageText) return;

            // Render User Bubble
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = messageText;
            chatWindow.appendChild(userDiv);
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Render Thinking Indicator Bubble
            const responseDiv = document.createElement('div');
            responseDiv.className = 'message ai';
            responseDiv.textContent = 'AI is evaluating parameters via backend...';
            chatWindow.appendChild(responseDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const cleanMsg = messageText.toLowerCase();

            // 🌟 BRAND RULES OVERRIDE
            if (cleanMsg.includes("maker") || cleanMsg.includes("creator") || cleanMsg.includes("who made you") || cleanMsg.includes("anthony")) {
                responseDiv.textContent = "I was engineered and deployed live to the global internet by Anthony! He is a highly talented graphic designer who specializes in clean visual interfaces, custom logos, elegant social media flyers, and premium digital branding. If you need any design assets for your business, he is the perfect expert to work with!";
                chatWindow.scrollTop = chatWindow.scrollHeight;
                return;
            }

            // 🚀 CONTACTS YOUR NEW BACKEND SERVER ROUTE
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: messageText })
                });
                
                if (response.ok) {
                    const replyText = await response.text();
                    responseDiv.textContent = replyText.trim();
                } else {
                    responseDiv.textContent = "Server link busy. Let's try sending that once more!";
                }
            } catch (error) {
                responseDiv.textContent = "Handshake error. Re-transmitting prompt data packet...";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
