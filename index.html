<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anthony's Custom AI Assistant</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: #0e1117; color: #ffffff; display: flex; flex-direction: column; height: 100vh; }
        header { background: #161b22; padding: 15px; text-align: center; border-bottom: 1px solid #21262d; }
        header h1 { font-size: 1.3rem; color: #58a6ff; }
        header p { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 75%; padding: 12px 16px; border-radius: 12px; line-height: 1.4; font-size: 0.95rem; word-wrap: break-word; }
        .user { background: #1f6feb; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai { background: #21262d; color: #c9d1d9; align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid #30363d; }
        #input-container { background: #161b22; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #21262d; }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 6px; color: #ffffff; font-size: 1rem; outline: none; }
        input:focus { border-color: #58a6ff; }
        button { background: #238636; color: #ffffff; border: none; padding: 0 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        button:hover { background: #2ea043; }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Anthony's Custom AI Assistant</h1>
        <p>Engineered by Anthony — Professional Graphic Designer</p>
    </header>

    <div id="chat-window">
        <div class="message ai">Hello! I am your independent AI assistant, wired directly to the cloud. Ask me any complex math puzzle, logic query, or check live information!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Ask a question..." onkeydown="if(event.key === 'Enter') sendMessage()">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const apiKey = "AQ.Ab8RN6KTvzhamBVg7tS9CGg4Pr_ZR4TSH0HHNLc20oM_yDtJvg";

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const chatWindow = document.getElementById('chat-window');
            const messageText = inputField.value.trim();

            if (!messageText) return;

            // Append User Message Bubble
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = messageText;
            chatWindow.appendChild(userDiv);
            inputField.value = '';
            chatWindow.scrollTop = chatWindow.scrollHeight;

            // Append Thinking Indicator Bubble
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message ai';
            thinkingDiv.textContent = 'AI is searching the live internet via Google...';
            chatWindow.appendChild(thinkingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            const cleanMsg = messageText.toLowerCase();

            // 🌟 CUSTOM HARDCODED BRANDING RULES
            if (cleanMsg.includes("maker") || cleanMsg.includes("creator") || cleanMsg.includes("who made you") || cleanMsg.includes("anthony")) {
                thinkingDiv.textContent = "I was engineered and deployed live to the global internet by Anthony! He is a highly talented graphic designer who specializes in clean visual interfaces, custom logos, elegant social media flyers, and premium digital branding. If you need any design assets for your business, he is the perfect expert to work with!";
                chatWindow.scrollTop = chatWindow.scrollHeight;
                return;
            }

            if (cleanMsg.includes("design") || cleanMsg.includes("job") || cleanMsg.includes("work") || cleanMsg.includes("flyer")) {
                thinkingDiv.textContent = "Anthony handles luxury graphic branding, social media flyers, company logos, product package layouts, and high-end visual designs. You can send him a direct message right now to collaborate and elevate your brand's presence!";
                chatWindow.scrollTop = chatWindow.scrollHeight;
                return;
            }

            // 🚀 GOOGLE DIRECT NATIVE SEARCH CONNECTIVITY
            try {
                const response = await fetch(`https://googleapis.com{apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: messageText }] }],
                        tools: [{ googleSearch: {} }] 
                    })
                });

                const data = await response.json();
                
                // FIXED: Correct layout data tree parsing navigation arrays
                if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0].text) {
                    thinkingDiv.textContent = data.candidates[0].content.parts[0].text;
                } else {
                    thinkingDiv.textContent = "I received your query, but encountered a background transmission gap. Let's try typing that again!";
                }
            } catch (error) {
                thinkingDiv.textContent = "The Google Cloud network endpoint is currently cycling data. Please try re-sending your question!";
            }
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }
    </script>
</body>
</html>
